<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Ledger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0f1e35;
      --navy-mid: #162845;
      --navy-light: #1e3459;
      --gold: #c9a84c;
      --gold-light: #e2c97e;
      --cream: #f5f0e8;
      --cream-dark: #ede5d6;
      --text: #1a1a2e;
      --muted: #6b7a99;
      --card-bg: #ffffff;
      --border: rgba(201, 168, 76, 0.2);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(201,168,76,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(15,30,53,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* NAVBAR */
    .navbar {
      background: var(--navy);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,0.25);
    }

    .navbar::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .navbar-brand {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--gold-light);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: opacity 0.2s;
    }
    .navbar-brand:hover { opacity: 0.8; }

    .navbar-user {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .navbar-email {
      color: rgba(255,255,255,0.5);
      font-size: 0.8rem;
      font-weight: 300;
      letter-spacing: 0.02em;
    }

    .btn-signout {
      background: transparent;
      border: 1px solid rgba(201,168,76,0.4);
      color: var(--gold-light);
      padding: 0.35rem 0.9rem;
      border-radius: 4px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: all 0.2s;
    }
    .btn-signout:hover {
      background: rgba(201,168,76,0.1);
      border-color: var(--gold);
    }

    /* MAIN LAYOUT */
    .main-content {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    /* PAGE HEADER */
    .page-header {
      margin-bottom: 2.5rem;
      animation: fadeUp 0.5s ease both;
    }

    .page-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 2rem;
      font-weight: 600;
      color: var(--navy);
      letter-spacing: 0.01em;
      display: flex;
      align-items: center;
      gap: 0.7rem;
      line-height: 1.1;
    }

    /* STATUS MESSAGES */
    .loading {
      color: var(--muted);
      font-style: italic;
      font-size: 0.9rem;
      animation: fadeUp 0.5s ease both;
    }
    .error {
      color: #c00;
      font-size: 0.9rem;
    }
    .auth-error {
      background: #fff0f0;
      border: 1px solid #fcc;
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      margin: 0.5rem 0 1rem;
      font-size: 0.85rem;
      color: #c00;
      animation: fadeUp 0.3s ease both;
    }

    /* SECTIONS */
    section {
      margin-bottom: 2.5rem;
      animation: fadeUp 0.5s ease both;
    }
    section:nth-child(2) { animation-delay: 0.08s; }
    section:nth-child(3) { animation-delay: 0.16s; }

    .section-heading {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .section-heading::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* CARDS */
    .memory-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .memory-card {
      background: var(--card-bg);
      border: 1px solid var(--cream-dark);
      border-radius: 8px;
      overflow: hidden;
      transition: box-shadow 0.25s, border-color 0.25s, transform 0.2s;
    }
    .memory-card:hover {
      box-shadow: 0 4px 24px rgba(15,30,53,0.1);
      border-color: rgba(201,168,76,0.3);
      transform: translateY(-1px);
    }

    .memory-card details summary {
      padding: 1rem 1.2rem;
      cursor: pointer;
      list-style: none;
      display: flex;
      align-items: flex-start;
      gap: 0.8rem;
      user-select: none;
    }
    .memory-card details summary::-webkit-details-marker { display: none; }

    .summary-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: linear-gradient(135deg, var(--navy-light), var(--navy));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .summary-icon svg {
      width: 13px;
      height: 13px;
      stroke: var(--gold-light);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
    }

    .summary-body { flex: 1; }

    .summary-title {
      font-weight: 500;
      font-size: 0.92rem;
      color: var(--navy);
      line-height: 1.3;
    }
    .summary-title a {
      color: inherit;
      text-decoration: none;
      transition: color 0.2s;
    }
    .summary-title a:hover { color: var(--gold); }

    .summary-meta {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.2rem;
      font-weight: 300;
    }

    .chevron {
      width: 16px;
      height: 16px;
      stroke: var(--muted);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      flex-shrink: 0;
      margin-top: 4px;
      transition: transform 0.25s;
    }
    details[open] .chevron { transform: rotate(90deg); }

    .detail-body {
      padding: 0.9rem 1.2rem 1.1rem 3.2rem;
      border-top: 1px solid var(--cream-dark);
    }

    .detail-body p, .detail-body div {
      font-size: 0.84rem;
      color: #4a5568;
      line-height: 1.7;
      font-weight: 300;
    }

    .detail-body a {
      color: var(--gold);
      text-decoration: none;
      word-break: break-all;
      font-size: 0.8rem;
    }
    .detail-body a:hover { text-decoration: underline; }

    .detail-body .links-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.4rem;
      font-weight: 500;
    }

    .attachments {
      margin-top: 0.7rem;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .attachments a {
      font-size: 0.78rem;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      margin-top: 0.3rem;
    }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a class="navbar-brand" href="#">Event Ledger</a>
    <div class="navbar-user">
      <span class="navbar-email" id="who"></span>
      <button class="btn-signout" id="signout" type="button" style="display:none">Sign out</button>
      <button class="btn-signout" id="signin" type="button">Sign in with Google</button>
      <button class="btn-signout" id="signin-redirect" type="button" style="display:none">Sign in (redirect)</button>
    </div>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title" id="page-title"></h1>
    </div>
    <div id="auth-error"></div>
    <div id="app"><p class="loading">Please sign in to load events&hellip;</p></div>
  </main>

<script type="module">
// --- Firebase config ---
// These values are safe to embed in a static page.
// IMPORTANT: this page is private via Firebase Auth + Firestore security rules.
// Override user_id via ?user_id=... query param.
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCRPmK9euOr_rDVcQDBh_BC9OVM2MnJF0s",
  authDomain: "living-memories-488001.firebaseapp.com",
  projectId: "living-memories-488001",
  appId: "1:404986156809:web:47877e11168d63a32965d8",
};
const DATABASE_ID = "living-memories-db";
const COLLECTION  = "memories";
const DEFAULT_USER_ID = "cambridge-lexington";

// --- Firebase SDK (CDN, modular) ---
import { initializeApp }   from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";
import { getFirestore, collection, query, where, getDocs }
  from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";

// --- Init ---
const app = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);
const db  = getFirestore(app, DATABASE_ID);

// --- Auth UI ---
const signInBtn = document.getElementById("signin");
const signInRedirectBtn = document.getElementById("signin-redirect");
const signOutBtn = document.getElementById("signout");
const whoEl = document.getElementById("who");
const authErrorEl = document.getElementById("auth-error");

const provider = new GoogleAuthProvider();

function showAuthError(msg) {
  authErrorEl.innerHTML = `<p class="auth-error">${escapeHtml(msg)}</p>`;
}

function clearAuthError() {
  authErrorEl.innerHTML = "";
}

signInBtn.addEventListener("click", async () => {
  clearAuthError();
  try {
    await signInWithPopup(auth, provider);
  } catch (err) {
    console.error("Popup sign-in failed:", err);
    showAuthError(`Popup sign-in failed: ${err.message}. Try the "Sign in (redirect)" button instead.`);
    signInRedirectBtn.style.display = "";
  }
});

signInRedirectBtn.addEventListener("click", async () => {
  clearAuthError();
  try {
    await signInWithRedirect(auth, provider);
  } catch (err) {
    console.error("Redirect sign-in failed:", err);
    showAuthError(`Redirect sign-in failed: ${err.message}`);
  }
});

signOutBtn.addEventListener("click", async () => {
  clearAuthError();
  await signOut(auth);
});

// Handle redirect result on page load
getRedirectResult(auth).catch((err) => {
  if (err.code === "auth/credential-already-in-use") return;
  console.error("Redirect result error:", err);
  showAuthError(`Sign-in error: ${err.message}`);
});

// --- Helpers ---
function getUserId() {
  const params = new URLSearchParams(window.location.search);
  return params.get("user_id") || DEFAULT_USER_ID;
}

function parseDate(s) {
  if (!s) return null;
  // "YYYY-MM-DD" → local date (avoid timezone shift)
  const [y, m, d] = s.split("-").map(Number);
  return new Date(y, m - 1, d);
}

function formatDate(d) {
  return d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric", year: "numeric" });
}

function today() {
  const now = new Date();
  return new Date(now.getFullYear(), now.getMonth(), now.getDate());
}

function weekStart(todayDate) {
  // Sunday-to-Saturday week: week starts on the most recent Sunday.
  const jsDay = todayDate.getDay(); // 0=Sun, 1=Mon, ..., 6=Sat
  const start = new Date(todayDate);
  start.setDate(start.getDate() - jsDay);
  return start;
}

function weekEnd(todayDate) {
  // Sunday-to-Saturday week: week ends on Saturday.
  const start = weekStart(todayDate);
  const end = new Date(start);
  end.setDate(end.getDate() + 6);
  return end;
}

function isExpired(expiresStr, todayDate) {
  // Matches Memory.is_expired: expired when today > expires
  const exp = parseDate(expiresStr);
  if (!exp) return false;
  return todayDate > exp;
}

// --- Markdown-lite: render [text](url) links and bare URLs ---
function renderInlineMarkdown(text) {
  if (!text) return "";
  let html = escapeHtml(text);
  // markdown links [text](url)
  html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
    '<a href="$2" target="_blank" rel="noopener">$1</a>');
  // bare URLs not already in an href
  html = html.replace(/(?<!href="|">)(https?:\/\/\S+?)(?=[)<\s]|$)/g,
    '<a href="$1" target="_blank" rel="noopener">$1</a>');
  return html;
}

function escapeHtml(s) {
  const el = document.createElement("span");
  el.textContent = s;
  return el.innerHTML;
}

function attachmentLabel(url) {
  try {
    const path = decodeURIComponent(new URL(url).pathname);
    const name = path.split("/").pop();
    return name || "attachment";
  } catch { return "attachment"; }
}

// --- SVG icons ---
const ICON_CALENDAR = `<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;
const ICON_ONGOING  = `<svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>`;
const ICON_CHEVRON  = `<svg class="chevron" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>`;

// --- Rendering ---
function renderEvent(mem) {
  const titleHtml = renderInlineMarkdown(mem.title || mem.content);
  const icon = mem.target ? ICON_CALENDAR : ICON_ONGOING;

  const metaParts = [];
  if (mem.target) metaParts.push(formatDate(parseDate(mem.target)));
  if (mem.time)   metaParts.push(escapeHtml(mem.time));
  if (mem.place)  metaParts.push(escapeHtml(mem.place));
  const metaHtml = metaParts.length
    ? `<div class="summary-meta">${metaParts.join(" &middot; ")}</div>`
    : "";

  const bodyParts = [];
  if (metaParts.length) {
    bodyParts.push(`<p>${metaParts.join("<br>")}</p>`);
  }
  if (mem.title && mem.content) {
    bodyParts.push(`<div>${renderInlineMarkdown(mem.content)}</div>`);
  }
  if (mem.attachments && mem.attachments.length) {
    const links = mem.attachments.map(url =>
      `<a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">&#128206; ${escapeHtml(attachmentLabel(url))}</a>`
    ).join(" ");
    bodyParts.push(`<div class="attachments">${links}</div>`);
  }

  const detailBody = bodyParts.length
    ? `<div class="detail-body">${bodyParts.join("\n")}</div>`
    : "";

  return `<li class="memory-card">
  <details>
    <summary>
      <div class="summary-icon">${icon}</div>
      <div class="summary-body">
        <div class="summary-title">${titleHtml}</div>
        ${metaHtml}
      </div>
      ${ICON_CHEVRON}
    </summary>
    ${detailBody}
  </details>
</li>`;
}

function renderSection(title, events, delay) {
  const style = delay ? ` style="animation-delay:${delay}s"` : "";
  if (!events.length) {
    return `<section${style}><h2 class="section-heading">${escapeHtml(title)}</h2><p class="loading">No events.</p></section>`;
  }
  const items = events.map(renderEvent).join("\n");
  return `<section${style}><h2 class="section-heading">${escapeHtml(title)}</h2><ul class="memory-list">\n${items}\n</ul></section>`;
}

// --- Main ---
async function loadAndRender() {
  const appEl = document.getElementById("app");
  const userId = getUserId();
  const t = today();
  const wStart = weekStart(t);
  const wEnd = weekEnd(t);

  appEl.innerHTML = `<p class="loading">Loading events from Firestore&hellip;</p>`;

  const q = query(
    collection(db, COLLECTION),
    where("user_id", "==", userId)
  );
  const snapshot = await getDocs(q);

  const memories = [];
  snapshot.forEach(doc => {
    const d = doc.data();
    if (!isExpired(d.expires, t)) {
      memories.push(d);
    }
  });

  // Sort: ongoing (no target) first, then by target ascending
  memories.sort((a, b) => {
    const aHas = a.target != null ? 1 : 0;
    const bHas = b.target != null ? 1 : 0;
    if (aHas !== bHas) return aHas - bHas;
    if (!a.target && !b.target) return 0;
    return a.target < b.target ? -1 : a.target > b.target ? 1 : 0;
  });

  // Split into sections (matches publisher logic — Sunday-to-Saturday weeks)
  const thisWeek = memories.filter(m => m.target == null || (parseDate(m.target) >= wStart && parseDate(m.target) <= wEnd));
  const upcoming = memories.filter(m => m.target != null && parseDate(m.target) > wEnd);

  appEl.innerHTML = renderSection("This Week", thisWeek, 0)
                  + renderSection("Upcoming", upcoming, 0.08);
}

function setSignedOutUi() {
  signInBtn.style.display = "";
  signInRedirectBtn.style.display = "none";
  signOutBtn.style.display = "none";
  whoEl.textContent = "";
  document.getElementById("page-title").textContent = "";
  document.getElementById("app").innerHTML = `<p class="loading">Please sign in to load events&hellip;</p>`;
}

function setSignedInUi(user) {
  signInBtn.style.display = "none";
  signInRedirectBtn.style.display = "none";
  signOutBtn.style.display = "";
  whoEl.textContent = user.email || user.displayName || "Signed in";
  document.getElementById("page-title").textContent = getUserId();
  clearAuthError();
}

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    setSignedOutUi();
    return;
  }

  setSignedInUi(user);
  try {
    await loadAndRender();
  } catch (err) {
    console.error("Firestore error:", err);
    document.getElementById("app").innerHTML = `<p class="error">Failed to load events: ${escapeHtml(err.message)}</p>
<p style="font-size:0.85rem;color:var(--muted);margin-top:0.5rem;">Check: (1) you are signed in, (2) Firestore rules allow reads for authenticated users, (3) authDomain includes zhihan.github.io.</p>`;
  }
});
</script>
</body>
</html>
